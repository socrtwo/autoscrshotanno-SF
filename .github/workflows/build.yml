name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List AutoIt scripts (legacy)
        run: |
          echo "Legacy AutoIt sources:"
          find . -name "*.au3" -exec echo "  {}" \;

      - name: Lint web app (syntax check)
        run: |
          node --check web/app/app.js
          node --check web/app/service-worker.js
          for f in web/app/*.html web/index.html; do
            python3 -c "import html.parser, sys; p=html.parser.HTMLParser(); p.feed(open('$f').read()); print('OK: $f')"
          done

      - name: Validate manifest JSON
        run: python3 -c "import json; json.load(open('web/app/manifest.webmanifest')); print('manifest OK')"

      - name: Dry-run release build
        run: bash scripts/build-releases.sh v0.0.0-ci
